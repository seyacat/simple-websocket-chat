# Deploy simple-websocket-chat to GitHub Pages
name: Deploy simple-websocket-chat

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-chat"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: PRODUCTION
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: cd simple-websocket-chat && npm install

      - name: Build
        run: cd simple-websocket-chat && npm run build
        env:
          VITE_WS_URL: ${{ vars.VITE_WS_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './simple-websocket-chat/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
